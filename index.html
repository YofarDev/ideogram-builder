<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Prompt Generation Tool</title>
    <style>:root {
            --bg-color: #f4f4f9;
            --panel-bg: #ffffff;
            --border: #ccc;
            --primary: #0066FF;
            --text: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-controls {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .main-content {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .right-col {
            width: 35%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .panel h3 {
            margin-top: 0;
            font-size: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .input-group input[type="text"],
        .input-group textarea {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0055cc;
        }

        /* Canvas Area */
        #canvas-wrapper {
            background: repeating-conic-gradient(#eee 0% 25%, transparent 0% 50%) 50% / 20px 20px;
            background-color: #fff;
            border: 2px dashed #999;
            position: relative;
            transform-origin: top left;
            margin-bottom: 10px;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        .bounding-box {
            position: absolute;
            border: 2px solid #ff0044;
            background: rgba(255, 0, 68, 0.2);
            cursor: grab;
            box-sizing: border-box;
        }

        .bounding-box.selected {
            border-color: #0066FF;
            background: rgba(0, 102, 255, 0.2);
            z-index: 10;
        }

        .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border: 1px solid black;
            right: -5px;
            bottom: -5px;
            cursor: nwse-resize;
        }

        /* Swatches */
        .color-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }

        .swatch {
            width: 30px;
            height: 30px;
            border: 1px solid #000;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            color: transparent;
            transition: 0.2s;
        }

        .swatch:hover {
            color: #fff;
            text-shadow: 0 0 2px #000;
        }

        #json-output {
            width: 100%;
            height: 300px;
            font-family: monospace;
            padding: 10px;
            box-sizing: border-box;
        }

        .pill-group { display: flex; gap: 12px; font-family: sans-serif; }
        .pill-group input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
        .pill-label { display: inline-block; padding: 1px 10px; background-color: #f3f4f6; border: 2px solid #e5e7eb; border-radius: 30px; cursor: pointer; }
        .pill-group input[type="radio"]:checked + .pill-label { background-color: #2563eb; color: white; border-color: #2563eb; }
        .pill-group p { display: inline-block; padding: 3px 10px;}
    </style>

</head>

<body>

    <div class="header-controls">
        <div style="width: 30%;">
            <label>Width: <span id="w-val">1024</span></label>
            <input type="range" id="canvas-width" min="256" max="4096" step="16" value="1024" style="width: 80%;">
        </div>
        <div style="width: 30%;">
            <label>Height: <span id="h-val">1024</span></label>
            <input type="range" id="canvas-height" min="256" max="4096" step="16" value="1024" style="width: 80%;">
        </div>
        <button onclick="initCanvas()">Go (Reset Canvas)</button>
    </div>

    <div class="main-content">
        <div class="left-col">
            <div><em>Click and drag below to create bounding boxes. Drag in a PNG from comfy to import its bounding boxes and prompts</em></div>
            <div style="width: 100%; max-height: 800px; border: 1px solid #ccc; background: #fff; margin: auto;">
                <div id="canvas-wrapper"></div>
            </div>

            <div style="display: flex; justify-content: space-around; width: 100%;">
                <button onclick="generateJSON()" style="background: #00CC88; padding: 12px; font-size: 16px; width:100%; margin:5px;">Generate JSON Prompt</button>
                <button onclick="clearBoxes();parseParametersFromJSON(JSON.parse(jsonOutput.value));parseBoxesFromJSON(JSON.parse(jsonOutput.value))" style="background: #00CC88; padding: 12px; font-size: 16px; width:100%; margin:5px;">Load From Pasted JSON</button>
            </div>
            <textarea id="json-output" placeholder="JSON will appear here...
Or paste a JSON here to load parameters from it"></textarea>
        <div>
            <label>Seed: <span id="r-seed-value">42</span></label>
            <input type="range" id="r-seed" min="1" max="99999" step="1" value="42">
        </div>
        <div>
            <label>Comfy API:</label>
            <input type="text" id="api-location" value="http://localhost:8188">
        </div>
            <button onclick="generateImage()" style="background: #00CC88; padding: 12px; font-size: 16px;">Generate Image</button>
            <img id="image-view" style="max-height: 800px; object-fit: scale-down;">
        </div>

        <div class="right-col">
            <div class="panel">
                <h3>Global Settings</h3>
                <div class="pill-group">
                    <p style="margin: 0;">Mode:</p>
                    <input type="radio" id="mode_photo" name="art_mode" value="photo" onchange="setPhotoArtstyle(0)">
                    <label for="mode_photo" class="pill-label">photo</label>

                    <input type="radio" id="mode_artstyle" name="art_mode" value="art_style" checked onchange="setPhotoArtstyle(1)">
                    <label for="mode_artstyle" class="pill-label">art_style</label>
                </div>
                <br>
                <div class="input-group"><label>High Level Description</label><input type="text"
                        id="high_level_description"></div>
                <div class="input-group"><label>Aesthetics</label><input type="text" id="aesthetics"></div>
                <div class="input-group"><label>Lighting</label><input type="text" id="lighting"></div>
                <div class="input-group"><label>Medium</label><input type="text" id="medium"></div>
                <div class="input-group"><label id="mode_label">Art Style</label><input type="text" id="art_style"></div>
                <div class="input-group"><label>Background</label><textarea id="background"></textarea></div>
                <div class="input-group">
                    <label>Global Color Palette (Max 16)</label>
                    <input type="color" id="global-color-picker">
                    <button onclick="addColor('global')">Add</button>
                    <div id="global-colors" class="color-list"></div>
                </div>
            </div>

            <div class="panel" id="box-panel" style="display: none;">
                <h3>Selected Box Properties</h3>
                <div class="input-group">
                    <label>Mode</label>
                    <select id="box-mode" onchange="updateBoxData()" onkeypress = "this.onchange();" onpaste    = "this.onchange();" oninput    = "this.onchange();">
                        <option value="obj">Object (obj)</option>
                        <option value="text">Text (text)</option>
                    </select>
                </div>
                <div class="input-group" id="text-input-group" style="display: none;">
                    <label>Text Content</label>
                    <input type="text" id="box-text" onchange="updateBoxData()" onkeypress = "this.onchange();" onpaste    = "this.onchange();" oninput    = "this.onchange();">
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <textarea id="box-desc" onchange="updateBoxData()" onkeypress = "this.onchange();" onpaste    = "this.onchange();" oninput    = "this.onchange();"></textarea>
                </div>
                <div class="input-group">
                    <label>Box Color Palette (Max 5)</label>
                    <input type="color" id="box-color-picker">
                    <button onclick="addColor('box')">Add</button>
                    <div id="box-colors" class="color-list"></div>
                </div>
                <button onclick="deleteSelectedBox()" style="background: #ff0044; width: 100%; margin-top: 10px;">Delete
                    Box</button>
            </div>
        </div>
    </div>

        let boxCounter = 0;

        // DOM Elements
        const canvas = document.getElementById('canvas-wrapper');

        const boxPanel = document.getElementById('box-panel');
        const jsonOutput = document.getElementById('json-output')

        // UI Listeners for sliders
        canvasWSlider.addEventListener('input', e => document.getElementById('w-val').innerText = e.target.value.toString().padStart(4, '0'));
        canvasHSlider.addEventListener('input', e => document.getElementById('h-val').innerText = e.target.value.toString().padStart(4, '0'));
        seedSlider.addEventListener('input', e => document.getElementById('r-seed-value').innerText = e.target.value.toString().padStart(5, '0'));

            e.preventDefault();
        });
        document.addEventListener('drop', (e) => {
            e.preventDefault();

                importImage(e.dataTransfer.files[0]); // is async
            }
        });

        function initCanvas() {
            canvasW = parseInt(canvasWSlider.value);
            canvasH = parseInt(canvasHSlider.value);
            canvas.style.width = canvasW + 'px';
            canvas.style.height = canvasH + 'px';

            // Scale to fit max 800px height visually
            scale = canvasH > 800 ? 800 / canvasH : 1;
            canvas.style.transform = `scale(${scale})`;
            canvas.parentElement.style.width = (canvasW * scale) + 'px';

            canvas.style.backgroundImage = ""
            canvas.style.backgroundSize = ""

            jsonOutput.value = '';
            clearBoxes();
        }

        function clearBoxes(){
            canvas.innerHTML = '';
            boxes = [];
            selectBox(null);
        }

        // Color Palette Logic
        function addColor(type) {
            const picker = document.getElementById(type + '-color-picker');
            let hex = picker.value.toUpperCase(); // Ideogram4 requires uppercase string

            if (type === 'global') {
                if (globalPalette.length >= 16) return alert("Max 16 colors allowed.");
                if (!globalPalette.includes(hex)) {
                    globalPalette.push(hex);
                    renderColors('global');
                }
            } else if (type === 'box' && selectedBoxId !== null) {
                const box = boxes.find(b => b.id === selectedBoxId);
                if (box.colors.length >= 5) return alert("Max 5 colors allowed per box.");
                if (!box.colors.includes(hex)) {
                    box.colors.push(hex);
                    renderColors('box');
                }
            }
        }

        function removeColor(type, hex) {
            if (type === 'global') {
                globalPalette = globalPalette.filter(c => c !== hex);
                renderColors('global');
            } else if (type === 'box' && selectedBoxId !== null) {
                const box = boxes.find(b => b.id === selectedBoxId);
                box.colors = box.colors.filter(c => c !== hex);
                renderColors('box');
            }
        }

        function renderColors(type) {
            const container = document.getElementById(type + '-colors');
            container.innerHTML = '';
            const list = type === 'global' ? globalPalette : (boxes.find(b => b.id === selectedBoxId)?.colors || []);

            list.forEach(hex => {
                const swatch = document.createElement('div');
                swatch.className = 'swatch';
                swatch.style.backgroundColor = hex;
                swatch.innerHTML = '×';
                swatch.onclick = () => removeColor(type, hex);
                container.appendChild(swatch);
            });
        }

        // Canvas Drawing Logic
        let isDrawing = false;
        let isDragging = false;
        let isResizing = false;
        let currentBoxDOM = null;
        let startX, startY;

        canvas.addEventListener('pointerdown', (e) => {
            if (e.target === canvas) {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                startX = (e.clientX - rect.left) / scale;
                startY = (e.clientY - rect.top) / scale;

                const box = {
                    id: 'box_' + boxCounter++,
                    x: startX, y: startY, w: 0, h: 0,
                    mode: 'obj', text: '', desc: '', colors: []
                };
                boxes.push(box);

                currentBoxDOM = document.createElement('div');
                currentBoxDOM.className = 'bounding-box selected';
                currentBoxDOM.id = box.id;
                currentBoxDOM.style.left = startX + 'px';
                currentBoxDOM.style.top = startY + 'px';

                const handle = document.createElement('div');
                handle.className = 'resize-handle';
                currentBoxDOM.appendChild(handle);

                canvas.appendChild(currentBoxDOM);
                selectBox(box.id);
            } else if (e.target.classList.contains('resize-handle')) {
                isResizing = true;
                currentBoxDOM = e.target.parentElement;
                selectBox(currentBoxDOM.id);
                const rect = canvas.getBoundingClientRect();
                dragStartX = (e.clientX - rect.left) / scale;
                dragStartY = (e.clientY - rect.top) / scale;
                initialBoxW = parseFloat(currentBoxDOM.style.width);
                initialBoxH = parseFloat(currentBoxDOM.style.height);
                e.stopPropagation();
            } else if (e.target.classList.contains('bounding-box')) {
                isDragging = true;
                currentBoxDOM = e.target;
                selectBox(currentBoxDOM.id);
                const rect = canvas.getBoundingClientRect();
                dragStartX = (e.clientX - rect.left) / scale;
                dragStartY = (e.clientY - rect.top) / scale;
                initialBoxX = parseFloat(currentBoxDOM.style.left);
                initialBoxY = parseFloat(currentBoxDOM.style.top);
                e.stopPropagation();
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const currentX = (e.clientX - rect.left) / scale;
            const currentY = (e.clientY - rect.top) / scale;

            if (isDrawing && currentBoxDOM) {
                const w = currentX - startX;
                const h = currentY - startY;
                currentBoxDOM.style.width = Math.abs(w) + 'px';
                currentBoxDOM.style.height = Math.abs(h) + 'px';
                currentBoxDOM.style.left = (w < 0 ? currentX : startX) + 'px';
                currentBoxDOM.style.top = (h < 0 ? currentY : startY) + 'px';
            }
        });

        window.addEventListener('pointerup', () => {
            if (isDrawing && currentBoxDOM) {
                // Save final dimensions
                const box = boxes.find(b => b.id === currentBoxDOM.id);
                box.w = parseFloat(currentBoxDOM.style.width) || 0;
                box.h = parseFloat(currentBoxDOM.style.height) || 0;
                box.x = parseFloat(currentBoxDOM.style.left) || 0;
                box.y = parseFloat(currentBoxDOM.style.top) || 0;

                if (box.w < 10 || box.h < 10) {
                    // Ignore tiny accidental clicks
                    canvas.removeChild(currentBoxDOM);
                    boxes = boxes.filter(b => b.id !== box.id);
                    selectBox(null);
                }
            }
            isDrawing = false;
            isDragging = false;
            isResizing = false;
            currentBoxDOM = null;
        });

        // Box Interaction (Select, Drag, Resize)
        let dragStartX, dragStartY, initialBoxX, initialBoxY, initialBoxW, initialBoxH;

        window.addEventListener('pointermove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const currentX = (e.clientX - rect.left) / scale;
            const currentY = (e.clientY - rect.top) / scale;

            if (isDragging && currentBoxDOM) {
                const dx = currentX - dragStartX;
                const dy = currentY - dragStartY;
                currentBoxDOM.style.left = (initialBoxX + dx) + 'px';
                currentBoxDOM.style.top = (initialBoxY + dy) + 'px';
            } else if (isResizing && currentBoxDOM) {
                const dx = currentX - dragStartX;
                const dy = currentY - dragStartY;
                currentBoxDOM.style.width = Math.max(10, initialBoxW + dx) + 'px';
                currentBoxDOM.style.height = Math.max(10, initialBoxH + dy) + 'px';
            }
        });

        // Box Forms logic
        function selectBox(id) {
            selectedBoxId = id;
            document.querySelectorAll('.bounding-box').forEach(el => el.classList.remove('selected'));
            if (id) {
                document.getElementById(id).classList.add('selected');
                boxPanel.style.display = 'block';

                const box = boxes.find(b => b.id === id);
                document.getElementById('box-mode').value = box.mode;
                document.getElementById('box-text').value = box.text;
                document.getElementById('box-desc').value = box.desc;
                document.getElementById('text-input-group').style.display = box.mode === 'text' ? 'block' : 'none';
                renderColors('box');
            } else {
                boxPanel.style.display = 'none';
            }
        }

        function updateBoxData() {
            if (!selectedBoxId) return;
            const box = boxes.find(b => b.id === selectedBoxId);
            box.mode = document.getElementById('box-mode').value;
            box.text = document.getElementById('box-text').value;
            box.desc = document.getElementById('box-desc').value;
            document.getElementById('text-input-group').style.display = box.mode === 'text' ? 'block' : 'none';
            console.log("change")
        }

        function deleteSelectedBox() {
            if (!selectedBoxId) return;
            const dom = document.getElementById(selectedBoxId);
            if (dom) dom.remove();
            boxes = boxes.filter(b => b.id !== selectedBoxId);
            selectBox(null);
        }

        // JSON Generation
        function generateJSON() {
            // Save current bounding box positions to state
            boxes.forEach(box => {
                const dom = document.getElementById(box.id);
                if (dom) {
                    box.x = parseFloat(dom.style.left);
                    box.y = parseFloat(dom.style.top);
                    box.w = parseFloat(dom.style.width);
                    box.h = parseFloat(dom.style.height);
                }
            });

            // Normalize Coordinates 0-1000
            const norm = (val, max) => Math.min(1000, Math.max(0, Math.round((val / max) * 1000)));

            const elements = boxes.map(box => {
                const x1 = norm(box.x, canvasW);
                const y1 = norm(box.y, canvasH);
                const x2 = norm(box.x + box.w, canvasW);
                const y2 = norm(box.y + box.h, canvasH);

                let el = {
                    type: box.mode,
                    bbox: [y1, x1, y2, x2],
                };

                if (box.mode === 'text') el.text = box.text;
                el.desc = box.desc;
                if (box.colors && box.colors.length > 0) el.color_palette = box.colors;

                return el;
            });

            var output = {
                high_level_description: document.getElementById('high_level_description').value,
                style_description: {
                    aesthetics: document.getElementById('aesthetics').value,
                    lighting: document.getElementById('lighting').value,
                    //medium: document.getElementById('medium').value,
                    //art_style: document.getElementById('art_style').value,
                    //color_palette: globalPalette
                },
                compositional_deconstruction: {
                    background: document.getElementById('background').value,
                    elements: elements
                }
            };

            // in photo mode, order in prompt should be "photo" then "medium",
            // while in art_style mode order should be "medium" then "art_style"
            if(photoArtStyleMode == MODE_PHOTO){
                output.style_description.photo = document.getElementById('art_style').value;
                output.style_description.medium = document.getElementById('medium').value;
            }
            else{
                output.style_description.medium = document.getElementById('medium').value;
                output.style_description.art_style = document.getElementById('art_style').value
            }

            output.style_description.color_palette = globalPalette

            jsonOutput.value = JSON.stringify(output, null, 2);
        }

        async function waitForComfyUIResult(
            promptId,
            serverUrl,
            pollInterval = 1000,
            timeout = 300000,
            fetchImages = true,
        ) {
            const startTime = Date.now();

            while (true) {
                if (Date.now() - startTime > timeout) {
                    throw new Error(`Timed out waiting for prompt ${promptId}`);
                }

                // Check prompt history
                const response = await fetch(
                    `${serverUrl}/history/${encodeURIComponent(promptId)}`
                );

                if (!response.ok) {
                    throw new Error(`Failed to fetch history: ${response.status}`);
                }

                const history = await response.json();

                // Prompt appears in history once execution completes
                if (history[promptId]) {
                    const outputs = history[promptId].outputs || {};

                    const results = [];

                    for (const nodeId of Object.keys(outputs)) {
                        const nodeOutput = outputs[nodeId];

                        if (!nodeOutput.images) continue;

                        for (const image of nodeOutput.images) {
                            const imageUrl =
                                `${serverUrl}/view?` +
                                new URLSearchParams({
                                    filename: image.filename,
                                    subfolder: image.subfolder || "",
                                    type: image.type || "output",
                                });

                            const result = {
                                nodeId,
                                imageUrl,
                                filename: image.filename,
                                subfolder: image.subfolder,
                                type: image.type,
                            };

                            if (fetchImages) {
                                const imgResp = await fetch(imageUrl);
                                result.blob = await imgResp.blob();
                            }

                            results.push(result);
                        }
                    }

                    return results;
                }

                await new Promise(resolve => setTimeout(resolve, pollInterval));
            }
        }

        function setImage(imgURL){
            document.getElementById("image-view").src = imgURL
            canvas.style.backgroundImage = `url("${imgURL}")`
            canvas.style.backgroundSize = "cover"
        }

        async function generateImage() {
            const api = document.getElementById("api-location").value
            json_prompt["98:24"]["inputs"]["text"] = jsonOutput.value
            json_prompt["98:27"]["inputs"]["value"] = canvasWSlider.value
            json_prompt["98:28"]["inputs"]["value"] = canvasHSlider.value
            json_prompt["98:18"]["inputs"]["noise_seed"] = seedSlider.value

            var req = await fetch(api+"/api/prompt", {
                "headers": {
                    "accept": "*/*",
                    "content-type": "application/json"
                },
                "body": JSON.stringify({ "prompt": json_prompt }),
                "method": "POST"
            });
            req = await req.json()
            const image = await waitForComfyUIResult(req.prompt_id, api,
                3000,
                300000,
                true
            )
            setImage(image[0].imageUrl)
        }

        function extractComfyUIMetadata(arrayBuffer) {
            const view = new DataView(arrayBuffer);

            // Check valid PNG 8-byte signature
            if (view.byteLength < 8 || view.getUint32(0) !== 0x89504E47 || view.getUint32(4) !== 0x0D0A1A0A) {
                throw new Error("Not a valid PNG file.");
            }

            let offset = 8;
            const result = {};

            while (offset < view.byteLength) {
                if (offset + 8 > view.byteLength) break;

                // Read chunk length and type
                const length = view.getUint32(offset);
                const chunkType = String.fromCharCode(
                    view.getUint8(offset + 4),
                    view.getUint8(offset + 5),
                    view.getUint8(offset + 6),
                    view.getUint8(offset + 7)
                );

                offset += 8; // Move past length and type

                if (chunkType === 'tEXt') {
                    if (offset + length > view.byteLength) break;

                    const chunkData = new Uint8Array(arrayBuffer, offset, length);
                    const nullByteIndex = chunkData.indexOf(0); // Keyword and text are separated by a 0x00 byte

                    if (nullByteIndex !== -1) {
                        const keyword = new TextDecoder('ascii').decode(chunkData.subarray(0, nullByteIndex));

                        if (keyword === 'prompt' || keyword === 'workflow') {
                            const rawText = new TextDecoder('utf-8').decode(chunkData.subarray(nullByteIndex + 1));
                            try {
                                result[keyword] = JSON.parse(rawText);
                            } catch (e) {
                                result[keyword] = rawText; // Fallback if JSON parsing fails
                            }
                        }
                    }
                }

                offset += length + 4; // Skip the data segment and the 4-byte CRC trailing checksum
            }
            for (const key of Object.keys(result.prompt)){
                try{
                    const json = JSON.parse(result.prompt[key].inputs.text)
                    if(json.hasOwnProperty("high_level_description")){
                        return json
                    }
                }
                catch(e){}
            }
        }

        function parseBoxesFromJSON(json){
            try{
                const n = json.compositional_deconstruction.elements.length
                for (var i=0; i<n; i++){
                    const element = json.compositional_deconstruction.elements[i]
                    const bbox = element.bbox
                    bbox[0] = bbox[0]/1000*canvasH
                    bbox[2] = bbox[2]/1000*canvasH
                    bbox[1] = bbox[1]/1000*canvasW
                    bbox[3] = bbox[3]/1000*canvasW
                    var box = {
                        id: 'box_' + boxCounter++,
                        x: bbox[1], y: bbox[0], w: bbox[3]-bbox[1], h: bbox[2]-bbox[0],
                        mode: element.type, text: element.text ?? '', desc: element.desc, colors: element.color_palette ?? []
                    }
                    boxes.push(box);

                    currentBoxDOM = document.createElement('div');
                    currentBoxDOM.className = 'bounding-box';
                    currentBoxDOM.id = box.id;
                    currentBoxDOM.style.left = box.x + 'px';
                    currentBoxDOM.style.top = box.y + 'px';
                    currentBoxDOM.style.width = box.w + 'px';
                    currentBoxDOM.style.height = box.h + 'px';

                    const handle = document.createElement('div');
                    handle.className = 'resize-handle';
                    currentBoxDOM.appendChild(handle);

                    canvas.appendChild(currentBoxDOM);

                    currentBoxDOM = null;
                }
            }
            catch(e){
                alert("invalid JSON")
            }
        }
        function parseParametersFromJSON(json){
            document.getElementById('high_level_description').value = json.high_level_description
            document.getElementById('aesthetics').value = json.style_description.aesthetics
            document.getElementById('lighting').value = json.style_description.lighting
            document.getElementById('medium').value = json.style_description.medium
            document.getElementById('background').value = json.compositional_deconstruction.background
            const globalColorPicker = document.getElementById('global-color-picker')
            globalPalette = [];
            renderColors('global');
            for(var i=0; i<json.style_description.color_palette.length; i++){
                globalColorPicker.value = json.style_description.color_palette[i];
                addColor('global');
            }

            if(json.style_description.hasOwnProperty("photo")){
                document.getElementById('art_style').value = json.style_description.photo
                document.getElementById('mode_photo').checked = true
                setPhotoArtstyle(MODE_PHOTO);
            }
            else{
                document.getElementById('art_style').value = json.style_description.art_style
                document.getElementById('mode_artstyle').checked = true
                setPhotoArtstyle(MODE_ARTSTYLE);
            }
        }

        async function importImage(image){
            console.log(image.size)
            if(image.type.startsWith("image")){
                // is image
                const img = new Image();
                img.onload = function() {
                    canvasWSlider.value = this.width.toString();
                    canvasWSlider.dispatchEvent(new Event('input'));
                    canvasHSlider.value = this.height.toString();
                    canvasHSlider.dispatchEvent(new Event('input'));
                    initCanvas();
                    setImage(img.src);

                    if(image.type=="image/png"){
                        // is png. try and find workflow metadata
                        image.arrayBuffer()
                        .then(buff => {
                            const json = extractComfyUIMetadata(buff);
                            jsonOutput.value = JSON.stringify(json, null, 2);
                            parseBoxesFromJSON(json)
                            parseParametersFromJSON(json)
                        })
                    }
                };
                img.src = URL.createObjectURL(image);
            }
            else{
                alert("images only")
            }
        }

        var photoArtStyleMode = 1;
        const MODE_PHOTO = 0;
        const MODE_ARTSTYLE = 1;
        function setPhotoArtstyle(mode){
            console.log(mode)
            photoArtStyleMode = mode
            if(mode==MODE_PHOTO){
                // photo mode
                document.getElementById("medium").value = "photograph";
                document.getElementById("medium").disabled = true
                document.getElementById("mode_label").innerText = "Photo"
            }
            else if (mode==MODE_ARTSTYLE){
                // art_style mode
                document.getElementById("medium").disabled = false
                document.getElementById("mode_label").innerText = "Art Style"
            }
            else{
                console.error("invalid mode")
            }
        }

        initCanvas();
        setPhotoArtstyle(1)
    </script>
