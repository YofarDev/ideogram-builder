<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Prompt Generation Tool</title>
    <style>:root {
            --bg-color: #f4f4f9;
            --panel-bg: #ffffff;
            --border: #ccc;
            --primary: #0066FF;
            --text: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-controls {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .main-content {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .right-col {
            width: 35%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .panel h3 {
            margin-top: 0;
            font-size: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .input-group input[type="text"],
        .input-group textarea {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0055cc;
        }

        /* Canvas Area */
        #canvas-wrapper {
            background: repeating-conic-gradient(#eee 0% 25%, transparent 0% 50%) 50% / 20px 20px;
            background-color: #fff;
            border: 2px dashed #999;
            position: relative;
            transform-origin: top left;
            margin-bottom: 10px;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        .bounding-box {
            position: absolute;
            border: 2px solid #ff0044;
            background: rgba(255, 0, 68, 0.2);
            cursor: grab;
            box-sizing: border-box;
        }

        .bounding-box.selected {
            border-color: #0066FF;
            background: rgba(0, 102, 255, 0.2);
            z-index: 10;
        }

        .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border: 1px solid black;
            right: -5px;
            bottom: -5px;
            cursor: nwse-resize;
        }

        /* Swatches */
        .color-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }

        .swatch {
            width: 30px;
            height: 30px;
            border: 1px solid #000;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            color: transparent;
            transition: 0.2s;
        }

        .swatch:hover {
            color: #fff;
            text-shadow: 0 0 2px #000;
        }

        #json-output {
            width: 100%;
            height: 300px;
            font-family: monospace;
            padding: 10px;
            box-sizing: border-box;
        }

        .pill-group { display: flex; gap: 12px; font-family: sans-serif; }
        .pill-group input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
        .pill-label { display: inline-block; padding: 1px 10px; background-color: #f3f4f6; border: 2px solid #e5e7eb; border-radius: 30px; cursor: pointer; }
        .pill-group input[type="radio"]:checked + .pill-label { background-color: #2563eb; color: white; border-color: #2563eb; }
        .pill-group p { display: inline-block; padding: 3px 10px;}
    </style>

</head>

<body>

    <div class="header-controls">
        <div style="width: 30%;">
            <label>Width: <span id="w-val">1024</span></label>
            <input type="range" id="canvas-width" min="256" max="4096" step="16" value="1024" style="width: 80%;">
        </div>
        <div style="width: 30%;">
            <label>Height: <span id="h-val">1024</span></label>
            <input type="range" id="canvas-height" min="256" max="4096" step="16" value="1024" style="width: 80%;">
        </div>
        <button id="btn-reset">Go (Reset Canvas)</button>
    </div>

    <div class="main-content">
        <div class="left-col">
            <div><em>Click and drag below to create bounding boxes. Drag in a PNG from comfy to import its bounding boxes and prompts</em></div>
            <div style="width: 100%; max-height: 800px; border: 1px solid #ccc; background: #fff; margin: auto;">
                <div id="canvas-wrapper"></div>
            </div>

            <div style="display: flex; justify-content: space-around; width: 100%;">
                <button id="btn-generate-json" style="background: #00CC88; padding: 12px; font-size: 16px; width:100%; margin:5px;">Generate JSON Prompt</button>
                <button id="btn-load-json" style="background: #00CC88; padding: 12px; font-size: 16px; width:100%; margin:5px;">Load From Pasted JSON</button>
            </div>
            <textarea id="json-output" placeholder="JSON will appear here...
Or paste a JSON here to load parameters from it"></textarea>
        <div>
            <label>Seed: <span id="r-seed-value">42</span></label>
            <input type="range" id="r-seed" min="1" max="99999" step="1" value="42">
        </div>
        <div>
            <label>Comfy API:</label>
            <input type="text" id="api-location" value="http://localhost:8188">
        </div>
            <button id="btn-generate-image" style="background: #00CC88; padding: 12px; font-size: 16px;">Generate Image</button>
            <img id="image-view" style="max-height: 800px; object-fit: scale-down;">
        </div>

        <div class="right-col">
            <div class="panel">
                <h3>Global Settings</h3>
                <div class="pill-group">
                    <p style="margin: 0;">Mode:</p>
                    <input type="radio" id="mode_photo" name="art_mode" value="photo">
                    <label for="mode_photo" class="pill-label">photo</label>

                    <input type="radio" id="mode_artstyle" name="art_mode" value="art_style" checked>
                    <label for="mode_artstyle" class="pill-label">art_style</label>
                </div>
                <br>
                <div class="input-group"><label>High Level Description</label><input type="text"
                        id="high_level_description"></div>
                <div class="input-group"><label>Aesthetics</label><input type="text" id="aesthetics"></div>
                <div class="input-group"><label>Lighting</label><input type="text" id="lighting"></div>
                <div class="input-group"><label>Medium</label><input type="text" id="medium"></div>
                <div class="input-group"><label id="mode_label">Art Style</label><input type="text" id="art_style"></div>
                <div class="input-group"><label>Background</label><textarea id="background"></textarea></div>
                <div class="input-group">
                    <label>Global Color Palette (Max 16)</label>
                    <input type="color" id="global-color-picker">
                    <button id="btn-add-global-color">Add</button>
                    <div id="global-colors" class="color-list"></div>
                </div>
            </div>

            <div class="panel" id="box-panel" style="display: none;">
                <h3>Selected Box Properties</h3>
                <div class="input-group">
                    <label>Mode</label>
                    <select id="box-mode">
                        <option value="obj">Object (obj)</option>
                        <option value="text">Text (text)</option>
                    </select>
                </div>
                <div class="input-group" id="text-input-group" style="display: none;">
                    <label>Text Content</label>
                    <input type="text" id="box-text">
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <textarea id="box-desc"></textarea>
                </div>
                <div class="input-group">
                    <label>Box Color Palette (Max 5)</label>
                    <input type="color" id="box-color-picker">
                    <button id="btn-add-box-color">Add</button>
                    <div id="box-colors" class="color-list"></div>
                </div>
                <button id="btn-delete-box" style="background: #ff0044; width: 100%; margin-top: 10px;">Delete
                    Box</button>
            </div>
        </div>
    </div>

    <script type="module" src="src/app.js"></script>

</body>

</html>
